<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Application Was Approved</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f4f4f7; color:#333; margin:0; }
    .container { max-width:600px; margin:32px auto; padding:24px; background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    .button { display:inline-block; padding:12px 24px; background:#065f46; color:#fff; text-decoration:none; border-radius:8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Congratulations!</h1>
    <p>Hi {{applicant_name}},</p>
    <p>Your application has been approved.</p>
    <ul>
      <li><strong>Current Position:</strong> {{current_position}}</li>
      <li><strong>New Position:</strong> {{new_position}}</li>
      <li><strong>Effective Date:</strong> {{effective_date}}</li>
    </ul>
    <p><a href="{{academic_portal_url}}" class="button">Open Academic Portal</a></p>
  </div>
</body>
</html>
