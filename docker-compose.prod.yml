# Production Docker Compose – standalone (not an overlay).
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
# Prerequisites:
#   cp .env.production.example .env  # then fill in secrets
#   ./deploy.sh                                  # guided full deployment

services:
  postgres:
    env_file: .env
    image: postgres:15-alpine
    container_name: osass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Loopback-only: accessible from host for debugging, not from the internet.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - osass-net

  redis:
    env_file: .env
    image: redis:7-alpine
    container_name: osass-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Loopback-only.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - osass-net

  minio:
    env_file: .env
    image: minio/minio:latest
    container_name: osass-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    # Expose MinIO externally so uploaded files can be served from the browser.
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - osass-net

  minio-init:
    env_file: .env
    image: minio/mc:latest
    container_name: osass-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://osass-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/$$MINIO_BUCKET_NAME;
        mc anonymous set download local/$$MINIO_BUCKET_NAME;
        exit 0;
      "
    networks:
      - osass-net

  identity-api:
    env_file: .env
    build:
      context: ./Umat.Osass
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: Umat.Osass.Identity.Api
    image: osass/identity-api:prod
    container_name: osass-identity-api
    restart: unless-stopped
    command: ["Umat.Osass.Identity.Api.dll"]
    # No host port – nginx routes /auth traffic internally.
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__IdentityRedisConfig__ConnectionString: redis:6379
      Redis__IdentityRedisConfig__DbNumber: 0
      BearerTokenConfig__Issuer: ${JWT_ISSUER}
      BearerTokenConfig__Audience: ${JWT_AUDIENCE}
      BearerTokenConfig__ApplicantSigningKey: ${JWT_APPLICANT_KEY}
      BearerTokenConfig__AdminSigningKey: ${JWT_ADMIN_KEY}
      EmailProvider__CurrentProvider: ${EMAIL_PROVIDER}
      CustomEmailConfig__TemplatesDirectory: EmailTemplates
      EmailConfig__SmtpHost: ${SMTP_HOST}
      EmailConfig__SmtpPort: ${SMTP_PORT}
      EmailConfig__SmtpUsername: ${SMTP_USERNAME}
      EmailConfig__SmtpPassword: ${SMTP_PASSWORD}
      EmailConfig__DefaultSenderName: ${SMTP_SENDER_NAME}
      EmailConfig__DefaultSenderEmail: ${SMTP_SENDER_EMAIL}
    volumes:
      - ./Osass/EmailTemplates:/app/EmailTemplates:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - osass-net

  admin-api:
    env_file: .env
    build:
      context: ./Umat.Osass
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: Umat.Osass.Admin.Api
    image: osass/admin-api:prod
    container_name: osass-admin-api
    restart: unless-stopped
    command: ["Umat.Osass.Admin.Api.dll"]
    # No host port – nginx routes admin.*/api traffic internally.
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AcademicConnection: >-
        Host=postgres;Port=5432;Database=AcademicPromotionDb;
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__NonAcademicConnection: >-
        Host=postgres;Port=5432;Database=NonAcademicPromotionDb;
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__IdentityConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__PropertyRedisConfig__ConnectionString: redis:6379
      Redis__PropertyRedisConfig__DbNumber: 1
      BearerTokenConfig__Issuer: ${JWT_ISSUER}
      BearerTokenConfig__Audience: ${JWT_AUDIENCE}
      BearerTokenConfig__AdminSigningKey: ${JWT_ADMIN_KEY}
      BearerTokenConfig__CustomerSigningKey: ${JWT_APPLICANT_KEY}
      StorageConfig__AccessKey: ${STORAGE_ACCESS_KEY}
      StorageConfig__SecretKey: ${STORAGE_SECRET_KEY}
      StorageConfig__BucketName: ${STORAGE_BUCKET}
      StorageConfig__Region: ${STORAGE_REGION}
      StorageConfig__Endpoint: ${STORAGE_ENDPOINT}
      StorageConfig__CdnEndpoint: ${STORAGE_CDN_ENDPOINT}
      EmailConfig__SmtpHost: ${SMTP_HOST}
      EmailConfig__SmtpPort: ${SMTP_PORT}
      EmailConfig__SmtpUsername: ${SMTP_USERNAME}
      EmailConfig__SmtpPassword: ${SMTP_PASSWORD}
      EmailConfig__DefaultSenderName: ${SMTP_SENDER_NAME}
      EmailConfig__DefaultSenderEmail: ${SMTP_SENDER_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - osass-net

  academic-promotion-api:
    env_file: .env
    build:
      context: ./Umat.Osass
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: Umat.Osass.Promotion.Academic.Api
    image: osass/academic-promotion-api:prod
    container_name: osass-academic-promotion-api
    restart: unless-stopped
    command: ["Umat.Osass.Promotion.Academic.Api.dll"]
    # No host port – nginx routes academic.*/api traffic internally.
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AcademicConnection: >-
        Host=postgres;Port=5432;Database=AcademicPromotionDb;
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__IdentityConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__PropertyRedisConfig__ConnectionString: redis:6379
      Redis__PropertyRedisConfig__DbNumber: 1
      BearerTokenConfig__Issuer: ${JWT_ISSUER}
      BearerTokenConfig__Audience: ${JWT_AUDIENCE}
      BearerTokenConfig__ApplicantSigningKey: ${JWT_APPLICANT_KEY}
      StorageConfig__AccessKey: ${STORAGE_ACCESS_KEY}
      StorageConfig__SecretKey: ${STORAGE_SECRET_KEY}
      StorageConfig__BucketName: ${STORAGE_BUCKET}
      StorageConfig__Region: ${STORAGE_REGION}
      StorageConfig__Endpoint: ${STORAGE_ENDPOINT}
      StorageConfig__CdnEndpoint: ${STORAGE_CDN_ENDPOINT}
      StorageConfig__FolderName: academic
      EmailProvider__CurrentProvider: ${EMAIL_PROVIDER}
      CustomEmailConfig__TemplatesDirectory: EmailTemplates
      EmailConfig__SmtpHost: ${SMTP_HOST}
      EmailConfig__SmtpPort: ${SMTP_PORT}
      EmailConfig__SmtpUsername: ${SMTP_USERNAME}
      EmailConfig__SmtpPassword: ${SMTP_PASSWORD}
      EmailConfig__DefaultSenderName: ${SMTP_SENDER_NAME}
      EmailConfig__DefaultSenderEmail: ${SMTP_SENDER_EMAIL}
    volumes:
      - ./Osass/EmailTemplates:/app/EmailTemplates:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - osass-net

  non-academic-promotion-api:
    env_file: .env
    build:
      context: ./Umat.Osass
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: Umat.Osass.Promotion.NonAcademic.Api
    image: osass/non-academic-promotion-api:prod
    container_name: osass-non-academic-promotion-api
    restart: unless-stopped
    command: ["Umat.Osass.Promotion.NonAcademic.Api.dll"]
    # No host port – nginx routes nonacademic.*/api traffic internally.
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__NonAcademicConnection: >-
        Host=postgres;Port=5432;Database=NonAcademicPromotionDb;
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__IdentityConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__PromotionRedisConfig__ConnectionString: redis:6379
      Redis__PromotionRedisConfig__DbNumber: 2
      BearerTokenConfig__Issuer: ${JWT_ISSUER}
      BearerTokenConfig__Audience: ${JWT_AUDIENCE}
      BearerTokenConfig__ApplicantSigningKey: ${JWT_APPLICANT_KEY}
      StorageConfig__AccessKey: ${STORAGE_ACCESS_KEY}
      StorageConfig__SecretKey: ${STORAGE_SECRET_KEY}
      StorageConfig__BucketName: ${STORAGE_BUCKET}
      StorageConfig__Region: ${STORAGE_REGION}
      StorageConfig__Endpoint: ${STORAGE_ENDPOINT}
      StorageConfig__CdnEndpoint: ${STORAGE_CDN_ENDPOINT}
      StorageConfig__FolderName: non-academic
      EmailProvider__CurrentProvider: ${EMAIL_PROVIDER}
      CustomEmailConfig__TemplatesDirectory: EmailTemplates
      EmailConfig__SmtpHost: ${SMTP_HOST}
      EmailConfig__SmtpPort: ${SMTP_PORT}
      EmailConfig__SmtpUsername: ${SMTP_USERNAME}
      EmailConfig__SmtpPassword: ${SMTP_PASSWORD}
      EmailConfig__DefaultSenderName: ${SMTP_SENDER_NAME}
      EmailConfig__DefaultSenderEmail: ${SMTP_SENDER_EMAIL}
    volumes:
      - ./Osass/EmailTemplates:/app/EmailTemplates:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - osass-net

  academic-portal:
    env_file: .env
    build:
      context: ./Osass/apps/academic-portal
      # VITE_* vars are baked into the JS bundle at build time.
      args:
        VITE_IDENTITY_API_URL: ${VITE_IDENTITY_API_URL}
        VITE_ACADEMIC_API_URL: ${VITE_ACADEMIC_API_URL}
        VITE_ACADEMIC_PORTAL_URL: ${VITE_ACADEMIC_PORTAL_URL}
        VITE_NON_ACADEMIC_PORTAL_URL: ${VITE_NON_ACADEMIC_PORTAL_URL}
        VITE_ACADEMIC_ASSESSMENT_PORTAL_URL: ${VITE_ACADEMIC_ASSESSMENT_PORTAL_URL}
        VITE_NON_ACADEMIC_ASSESSMENT_PORTAL_URL: ${VITE_NON_ACADEMIC_ASSESSMENT_PORTAL_URL}
        VITE_ADMIN_PORTAL_URL: ${VITE_ADMIN_PORTAL_URL}
    image: osass/academic-portal:prod
    container_name: osass-academic-portal
    restart: unless-stopped
    # No host port – served exclusively through nginx gateway.
    networks:
      - osass-net

  admin-portal:
    env_file: .env
    build:
      context: ./Osass/apps/admin-portal
      args:
        VITE_IDENTITY_API_URL: ${VITE_IDENTITY_API_URL}
        VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL}
        VITE_LANDING_URL: ${VITE_LANDING_URL}
    image: osass/admin-portal:prod
    container_name: osass-admin-portal
    restart: unless-stopped
    networks:
      - osass-net

  non-academic-portal:
    env_file: .env
    build:
      context: ./Osass/apps/non-academic-portal
      args:
        VITE_IDENTITY_API_URL: ${VITE_IDENTITY_API_URL}
        VITE_NON_ACADEMIC_API_URL: ${VITE_NON_ACADEMIC_API_URL}
        VITE_LANDING_URL: ${VITE_LANDING_URL}
    image: osass/non-academic-portal:prod
    container_name: osass-non-academic-portal
    restart: unless-stopped
    networks:
      - osass-net

  academic-assessment-portal:
    env_file: .env
    build:
      context: ./Osass/apps/academic-assessment-portal
      args:
        VITE_IDENTITY_API_URL: ${VITE_IDENTITY_API_URL}
        VITE_ACADEMIC_API_URL: ${VITE_ACADEMIC_API_URL}
        VITE_LANDING_URL: ${VITE_LANDING_URL}
    image: osass/academic-assessment-portal:prod
    container_name: osass-academic-assessment-portal
    restart: unless-stopped
    networks:
      - osass-net

  non-academic-assessment-portal:
    env_file: .env
    build:
      context: ./Osass/apps/non-academic-assessment-portal
      args:
        VITE_IDENTITY_API_URL: ${VITE_IDENTITY_API_URL}
        VITE_NON_ACADEMIC_API_URL: ${VITE_NON_ACADEMIC_API_URL}
        VITE_LANDING_URL: ${VITE_LANDING_URL}
    image: osass/non-academic-assessment-portal:prod
    container_name: osass-non-academic-assessment-portal
    restart: unless-stopped
    networks:
      - osass-net

  # ── Gateway ────────────────────────────────────────────────────────────────
  # Only service that exposes ports to the internet.

  nginx:
    image: nginx:1.27-alpine
    container_name: osass-nginx
    restart: unless-stopped
    ports:
      # Domain mode: only 80 + 443 are needed.
      - "80:80"
      - "443:443"
      # IP mode (nginx.ip.conf): one port per service.
      - "8001:8001"   # admin portal
      - "8002:8002"   # non-academic portal
      - "8003:8003"   # academic assessment portal
      - "8004:8004"   # non-academic assessment portal
      - "8081:8081"   # identity api
      - "8082:8082"   # admin api
      - "8083:8083"   # academic promotion api
      - "8084:8084"   # non-academic promotion api
    volumes:
      # Switch between domain and IP mode by setting NGINX_CONF_FILE in .env
      - ${NGINX_CONF_FILE:-./docker/nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - identity-api
      - admin-api
      - academic-promotion-api
      - non-academic-promotion-api
      - academic-portal
      - admin-portal
      - non-academic-portal
      - academic-assessment-portal
      - non-academic-assessment-portal
    networks:
      - osass-net

  # ── SSL auto-renewal ───────────────────────────────────────────────────────
  # Issues initial cert via: ./deploy.sh --ssl
  # Checks for renewal every 12 h automatically.

  certbot:
    image: certbot/certbot:latest
    container_name: osass-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
    name: osass_postgres_data
  redis_data:
    name: osass_redis_data
  minio_data:
    name: osass_minio_data
  certbot_www:
    name: osass_certbot_www
  certbot_conf:
    name: osass_certbot_conf

networks:
  osass-net:
    name: osass-net
    driver: bridge
