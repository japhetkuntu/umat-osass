# =============================================================================
# UMaT OSASS – Nginx IP+Port Gateway  (temporary, pre-domain)
# =============================================================================
# Use this config when no domain is available yet.
# Switch to nginx.conf once DNS is live and run: ./deploy.sh --ssl
#
# Port map (all via nginx → internal containers):
#
#   :80    → academic-portal            (main landing page)
#   :8001  → admin-portal
#   :8002  → non-academic-portal
#   :8003  → academic-assessment-portal
#   :8004  → non-academic-assessment-portal
#   :8081  → identity-api               (auth)
#   :8082  → admin-api
#   :8083  → academic-promotion-api
#   :8084  → non-academic-promotion-api
#
# In .env.production set:
#   NGINX_CONF_FILE=./docker/nginx/nginx.ip.conf
# =============================================================================

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    client_max_body_size 50M;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype image/svg+xml;

    # ── Global proxy settings ──────────────────────────────────────────────────
    proxy_http_version    1.1;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        keep-alive;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_buffer_size     4k;
    proxy_buffers         8 4k;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"    always;

    # ── Docker embedded DNS ────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ==========================================================================
    # :80  –  Academic Portal  (main landing page)
    # ==========================================================================
    server {
        listen 80 default_server;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        location / {
            set $upstream http://academic-portal:80;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8001  –  Admin Portal
    # ==========================================================================
    server {
        listen 8001;
        location / {
            set $upstream http://admin-portal:80;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8002  –  Non-Academic Portal
    # ==========================================================================
    server {
        listen 8002;
        location / {
            set $upstream http://non-academic-portal:80;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8003  –  Academic Assessment Portal
    # ==========================================================================
    server {
        listen 8003;
        location / {
            set $upstream http://academic-assessment-portal:80;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8004  –  Non-Academic Assessment Portal
    # ==========================================================================
    server {
        listen 8004;
        location / {
            set $upstream http://non-academic-assessment-portal:80;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8081  –  Identity API
    # ==========================================================================
    server {
        listen 8081;
        location / {
            set $upstream http://identity-api:8080;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8082  –  Admin API
    # ==========================================================================
    server {
        listen 8082;
        location / {
            set $upstream http://admin-api:8080;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8083  –  Academic Promotion API
    # ==========================================================================
    server {
        listen 8083;
        location / {
            set $upstream http://academic-promotion-api:8080;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # :8084  –  Non-Academic Promotion API
    # ==========================================================================
    server {
        listen 8084;
        location / {
            set $upstream http://non-academic-promotion-api:8080;
            proxy_pass $upstream;
        }
    }
}
