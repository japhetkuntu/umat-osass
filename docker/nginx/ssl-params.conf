# =============================================================================
# SSL / TLS security parameters for Let's Encrypt certificates.
# Include in HTTPS server blocks AFTER running ./deploy.sh --ssl
#
# Example usage inside a server {} block:
#   ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
#   include /etc/nginx/ssl-params.conf;
# =============================================================================

ssl_protocols             TLSv1.2 TLSv1.3;
ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers off;

ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP stapling – speeds up TLS handshake for clients
ssl_stapling        on;
ssl_stapling_verify on;
resolver            8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout    5s;

# HSTS – instruct browsers to always use HTTPS (6 months)
add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
