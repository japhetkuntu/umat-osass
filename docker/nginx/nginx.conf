# =============================================================================
# UMaT OSASS – Nginx Production Gateway
# =============================================================================
# Routing model:
#
#   osass.umat.edu.gh                        → academic-portal:80
#   auth-api.osass.umat.edu.gh               → identity-api:8080
#   academic-api.osass.umat.edu.gh           → academic-promotion-api:8080
#   nonacademic.osass.umat.edu.gh            → non-academic-portal:80
#   nonacademic-api.osass.umat.edu.gh        → non-academic-promotion-api:8080
#   assessment.osass.umat.edu.gh             → academic-assessment-portal:80
#   nonacademic-assessment.osass.umat.edu.gh → non-academic-assessment-portal:80
#   admin.osass.umat.edu.gh                  → admin-portal:80
#   admin-api.osass.umat.edu.gh              → admin-api:8080
#   <server-ip>  (default)                   → 301 → osass.umat.edu.gh
#
# HTTPS upgrade: run  ./deploy.sh --ssl  then restart nginx.
# =============================================================================

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # Max upload size (adjust for file-heavy APIs)
    client_max_body_size 50M;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype image/svg+xml;

    # ── Global proxy settings ──────────────────────────────────────────────────
    proxy_http_version    1.1;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        keep-alive;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_buffer_size     4k;
    proxy_buffers         8 4k;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"    always;

    # ── Docker embedded DNS ────────────────────────────────────────────────────
    # Using variables in proxy_pass defers DNS resolution to request time,
    # allowing nginx to start even when upstream containers aren't ready yet.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Helper: certbot ACME challenge ────────────────────────────────────────
    # Reused across all server blocks via include or inline.

    # ===========================================================================
    # auth-api.osass.umat.edu.gh  –  Identity / Auth API
    # ===========================================================================
    server {
        listen 80;
        server_name auth-api.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://identity-api:8080;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # academic-api.osass.umat.edu.gh  –  Academic Promotion API
    # ===========================================================================
    server {
        listen 80;
        server_name academic-api.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://academic-promotion-api:8080;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # osass.umat.edu.gh  –  Academic Portal (root domain)
    # ===========================================================================
    server {
        listen 80;
        server_name osass.umat.edu.gh www.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Portal (SPA) → academic-portal container
        location / {
            set $upstream http://academic-portal:80;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # nonacademic-api.osass.umat.edu.gh  –  Non-Academic Promotion API
    # ===========================================================================
    server {
        listen 80;
        server_name nonacademic-api.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://non-academic-promotion-api:8080;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # nonacademic.osass.umat.edu.gh  –  Non-Academic Portal
    # ===========================================================================
    server {
        listen 80;
        server_name nonacademic.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://non-academic-portal:80;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # assessment.osass.umat.edu.gh  –  Academic Assessment Portal
    # ===========================================================================
    server {
        listen 80;
        server_name assessment.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://academic-assessment-portal:80;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # nonacademic-assessment.osass.umat.edu.gh  –  Non-Academic Assessment Portal
    # ===========================================================================
    server {
        listen 80;
        server_name nonacademic-assessment.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://non-academic-assessment-portal:80;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # admin-api.osass.umat.edu.gh  –  Admin API
    # ===========================================================================
    server {
        listen 80;
        server_name admin-api.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://admin-api:8080;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # admin.osass.umat.edu.gh  –  Admin Portal
    # ===========================================================================
    server {
        listen 80;
        server_name admin.osass.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://admin-portal:80;
            proxy_pass $upstream;
        }
    }

    # ===========================================================================
    # Default / IP-based access  –  health check + redirect to root domain
    # ===========================================================================
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Simple health endpoint for load balancers / monitoring
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        # Redirect bare IP requests to the canonical domain
        location / {
            return 301 http://osass.umat.edu.gh$request_uri;
        }
    }
}
